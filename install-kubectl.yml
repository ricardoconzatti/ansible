- name: Prepare node (disable swap, install kubectl)
  hosts: all
  become: yes

  tasks:

    - name: Disable swap immediately
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Disable swap permanently in fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Install snapd
      apt:
        name: snapd
        state: present

    - name: Install kubectl via snap
      community.general.snap:
        name: kubectl
        classic: yes

    - name: Install dependencies (nfs-common)
      apt:
        name: nfs-common
        state: present
        update_cache: yes
