- name: Create Dashboard ServiceAccount and Token
  hosts: kasten-lab
  become: yes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  vars:
    sa_name: svc-dashboard-admin
    namespace: headlamp
    role_name: svc-dashboard-admin
    token_duration: 8h
    use_artifact: "{{ use_artifact | default(false) }}"

  tasks:

    - name: Create ServiceAccount
      shell: |
        kubectl -n {{ namespace }} apply -f - <<EOF
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: {{ sa_name }}
        EOF

    - name: Create ClusterRoleBinding
      shell: |
        kubectl apply -f - <<EOF
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: {{ role_name }}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: cluster-admin
        subjects:
          - kind: ServiceAccount
            name: {{ sa_name }}
            namespace: {{ namespace }}
        EOF

    - name: Generate token
      shell: >
        kubectl -n {{ namespace }} create token {{ sa_name }} --duration={{ token_duration }}
      register: token_output

    - name: Show credentials
      debug:
        msg:
          - "Dashboard User: {{ sa_name }}"
          - "Namespace: {{ namespace }}"
          - "Token ---> {{ token_output.stdout }} <---"

    - name: Log update (site)
      uri:
        url: "{{ site_webhook_logs }}"
        method: POST
        body_format: json
        body:
          lab_id: "{{ labid }}"
          message: "Service Account, Token and Permissions configured"
        headers:
          Content-Type: "application/json"
          x-webhook-secret: "{{ webhook_secret }}"
        validate_certs: no

    - name: Add Dashboard (token) to artifact
      include_role:
        name: artifact
      vars:
        artifact_section:
          dashboard:
            token: "{{ token_output.stdout }}"
